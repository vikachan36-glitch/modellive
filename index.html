<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>


<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}


canvas{
    display:block;
}

</style>

</head>


<body>


<script>

window.PIXI = PIXI;


const app = new PIXI.Application({

    resizeTo: window,

    transparent:true,

    antialias:true,

    autoDensity:true,

    resolution:window.devicePixelRatio || 1

});


document.body.appendChild(app.view);



(async()=>{


const model = await PIXI.live2d.Live2DModel.from(

"https://vikachan36-glitch.github.io/modellive/modelweb/modelweb.model3.json"

);



app.stage.addChild(model);



function fitModel() {

    const w = window.innerWidth;
    const h = window.innerHeight;

    // Получаем реальные размеры модели
    const bounds = model.getBounds();

    // Масштабируем с запасом
    const scale = Math.min(
        (w * 0.80) / bounds.width,
        (h * 0.88) / bounds.height
    );

    model.scale.set(scale);

    // Обновляем размеры после масштабирования
    const b = model.getBounds();

    // Строго по центру
    model.x = w / 2 - (b.x + b.width / 2);

    // Поднимаем модель так, чтобы было примерно по пояс
    model.y = h * 0.40 - b.y;

}



fitModel();



window.addEventListener(

"resize",

fitModel

);



// взгляд за мышкой

document.addEventListener(

"mousemove",

(e)=>{

    model.focus(
        e.clientX,
        e.clientY
    );

}

);



})();



</script>


</body>
</html>
