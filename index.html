<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя Live2D модель</title>
  <style>
    /* Убираем отступы и скроллы */
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background: #2c2c2c;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Контейнер для модели */
    #live2d-container {
      width: 500px;
      height: 700px;
      position: relative;
    }
    /* Холст внутри контейнера */
    #live2d-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>

  <div id="live2d-container"></div>

  <!-- Подключаем библиотеку для работы с Live2D -->
  <script src="https://unpkg.com/l2d-widget@0.2.10/dist/index.min.js"></script>

  <script>
    // Ждём, пока библиотека загрузится
    window.addEventListener('load', () => {
      // Создаём виджет с моделью
      const widget = createWidget({
        // Путь к вашей модели (относительно корня сайта)
        model: {
          path: './modelweb/modelweb.model3.json',
        },
        // Включаем слежение за курсором
        eyeTracking: true,
        // Отключаем перехват мыши, чтобы не мешать другим элементам
        pointerEvents: false,
        // Размещаем модель внутри контейнера
        container: document.getElementById('live2d-container'),
      });
    });
  </script>

</body>
</html>
