<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live2D</title>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { display: block; }
    </style>
</head>
<body>

<!-- ВСЕ В ОДНОМ СКРИПТЕ -->
<script type="importmap">
{
    "imports": {
        "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/esm/pixi.min.js",
        "pixi-live2d-display": "https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/pixi-live2d-display.esm.js"
    }
}
</script>

<script type="module">
    import * as PIXI from 'pixi.js';
    import { Live2DModel } from 'pixi-live2d-display';

    const app = new PIXI.Application({
        width: 500,
        height: 700,
        transparent: true,
        backgroundAlpha: 0,
        antialias: true
    });
    document.body.prepend(app.view);

    try {
        const model = await Live2DModel.from(
            'https://raw.githubusercontent.com/vikachan36-glitch/modellive/main/modelweb/modelweb.model3.json'
        );
        
        model.anchor.set(0.5, 0.5);
        model.x = app.screen.width / 2;
        model.y = app.screen.height / 2;
        model.scale.set(0.35);
        
        app.stage.addChild(model);

        // Слежение за мышью (упрощенное)
        app.stage.interactive = true;
        app.stage.on('mousemove', (e) => {
            const pos = e.data.global;
            const dx = (pos.x / app.screen.width - 0.5) * 2;
            const dy = (pos.y / app.screen.height - 0.5) * -2;
            
            if (model.internalModel && model.internalModel.motionManager) {
                const motion = model.internalModel.motionManager;
                motion.setParam('PARAM_ANGLE_X', dx * 30);
                motion.setParam('PARAM_ANGLE_Y', dy * 20);
                motion.setParam('PARAM_EYE_BALL_X', dx);
                motion.setParam('PARAM_EYE_BALL_Y', dy);
            }
        });

        console.log('Модель загружена!');
    } catch (err) {
        console.error('Ошибка:', err);
        document.body.innerHTML = 'Ошибка: ' + err.message;
    }
</script>
</body>
</html>
