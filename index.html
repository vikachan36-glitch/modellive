<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live2D Модель</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
    }
    #l2d-container {
      width: 450px;
      height: 650px;
      border: 2px solid #ff6b6b;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="l2d-container"></div>

  <script src="https://unpkg.com/l2d-widget@0.4.0/dist/index.min.js"></script>
  <script>
    console.log('Скрипт начал работу');
    
    const container = document.getElementById('l2d-container');
    console.log('Контейнер найден:', container);

    const widget = createWidget({
      container: container,
      model: {
        path: 'https://raw.githubusercontent.com/vikachan36-glitch/modellive/main/modelweb/modelweb.model3.json'
      },
      pointerEvents: false,
      eyeTracking: true,
      width: 450,
      height: 650
    });

    console.log('Виджет создан:', widget);
  </script>
</body>
</html>
