<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Live2D Model</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

canvas{
    width:100%;
    height:100%;
}
</style>

<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>

<script type="module">

import {Live2DModel} from 
"https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.mjs";


window.onload = async()=>{


const app = new PIXI.Application({
    view:document.querySelector("#canvas"),
    resizeTo:window,
    backgroundAlpha:0
});


const model = await Live2DModel.from(
    "./modelweb/modelweb.model3.json"
);


app.stage.addChild(model);



model.scale.set(0.35);

model.x = window.innerWidth/2;

model.y = window.innerHeight*0.85;



model.anchor.set(0.5,0.5);



window.addEventListener("resize",()=>{

    model.x = window.innerWidth/2;
    model.y = window.innerHeight*0.85;

});



model.on("hit",()=>{
    console.log("click");
});


};

</script>

</head>

<body>

<canvas id="canvas"></canvas>

</body>
</html>
