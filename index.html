<script>
window.PIXI = PIXI;

const app = new PIXI.Application({
    resizeTo: window,
    transparent: true,
    antialias: true,
    autoDensity: true,
    resolution: window.devicePixelRatio || 1
});

document.body.appendChild(app.view);

(async () => {

    const model = await PIXI.live2d.Live2DModel.from(
        "https://vikachan36-glitch.github.io/modellive/modelweb/modelweb.model3.json"
    );

    app.stage.addChild(model);

    function fitModel() {

        const w = window.innerWidth;
        const h = window.innerHeight;

        // настоящий размер модели
        const bounds = model.getLocalBounds();

        // оставляем небольшой запас, чтобы ничего не обрезалось
        const scale = Math.min(
            w * 0.9 / bounds.width,
            h * 0.9 / bounds.height
        );

        model.scale.set(scale);

        // центр по горизонтали
        model.x = w / 2;

        // ноги почти у нижнего края
        model.y = h * 0.98;

        model.anchor.set(0.5, 1);
    }

    fitModel();

    window.addEventListener("resize", fitModel);

    document.addEventListener("mousemove", (e) => {
        model.focus(e.clientX, e.clientY);
    });

})();
</script>
