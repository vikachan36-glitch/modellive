<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Моя Live2D модель</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    #l2d-container {
      width: 400px;
      height: 600px;
      pointer-events: none; /* Чтобы не мешать вашему курсору на Крафтум */
    }
  </style>
</head>
<body>
  <div id="l2d-container"></div>

  <script src="https://unpkg.com/l2d-widget/dist/index.min.js"></script>
  <script>
    const widget = createWidget({
      container: document.getElementById('l2d-container'),
      model: {
        path: 'https://raw.githubusercontent.com/vikachan36-glitch/modellive/main/modelweb/modelweb.model3.json'
      },
      pointerEvents: false,
      eyeTracking: true
    });
  </script>
</body>
</html>
