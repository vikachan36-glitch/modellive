<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
}
canvas{
  display:block;
}
</style>
</head>

<body>
<script>
const app = new PIXI.Application({
  width: 500,
  height: 700,
  transparent: true
});
document.body.appendChild(app.view);

(async () => {
  try {
    const model = await PIXI.live2d.Live2DModel.from(
      "modelweb.model3.json"
    );

    app.stage.addChild(model);

    model.anchor.set(0.5, 0.5);
    model.x = 250;
    model.y = 350;
    model.scale.set(0.20);

    // === СЛЕЖЕНИЕ ЗА КУРСОРОМ ===
    let targetAngleX = 0;
    let targetAngleY = 0;
    let currentAngleX = 0;
    let currentAngleY = 0;

    document.addEventListener('mousemove', (e) => {
      const rect = app.view.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;

      targetAngleX = (x - 0.5) * 40;
      targetAngleY = (y - 0.5) * -40;
    });

    app.ticker.add(() => {
      currentAngleX += (targetAngleX - currentAngleX) * 0.08;
      currentAngleY += (targetAngleY - currentAngleY) * 0.08;

      if (model.internalModel) {
        model.internalModel.setParameterValueById("ParamAngleX", currentAngleX);
        model.internalModel.setParameterValueById("ParamAngleY", currentAngleY);
      }
    });

    console.log("MODEL LOADED");
  }
  catch(e) {
    console.error(e);
    document.body.innerHTML = "<h2 style='color:white'>ОШИБКА:<br>" + e + "</h2>";
  }
})();
</script>
</body>
</html>
